<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Sistema de Cadastro de Alunos</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    margin:20px;
}

.container{
    background:white;
    max-width:700px;
    margin:auto;
    padding:20px;
    border-radius:10px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin:8px 0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid black;
}

th,td{
    padding:8px;
    text-align:center;
}

th{
    background:#0b74de;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Cadastro de Alunos</h2>

<input type="text" id="nome" placeholder="Nome do aluno">

<input type="text" id="classe" placeholder="Classe">

<input type="text" id="curso" placeholder="Curso">

<input type="text" id="turma" placeholder="Turma">

<input type="text" id="sala" placeholder="Sala">

<select id="periodo">
<option>Manhã</option>
<option>Tarde</option>
<option>Noite</option>
</select>

<input type="number" id="n1" placeholder="1º Trimestre">

<input type="number" id="n2" placeholder="2º Trimestre">

<input type="number" id="n3" placeholder="3º Trimestre">

<button onclick="cadastrar()">Cadastrar Aluno</button>

<table>

<thead>

<tr>
<th>Nome</th>
<th>Classe</th>
<th>Curso</th>
<th>Turma</th>
<th>Sala</th>
<th>Período</th>
<th>Média</th>
<th>Situação</th>
</tr>

</thead>

<tbody id="lista"></tbody>

</table>

</div>

<script>

function cadastrar(){

let nome=document.getElementById("nome").value;
let classe=document.getElementById("classe").value;
let curso=document.getElementById("curso").value;
let turma=document.getElementById("turma").value;
let sala=document.getElementById("sala").value;
let periodo=document.getElementById("periodo").value;

let n1=parseFloat(document.getElementById("n1").value);
let n2=parseFloat(document.getElementById("n2").value);
let n3=parseFloat(document.getElementById("n3").value);

let media=(n1+n2+n3)/3;

let situacao="Recurso";

if(media>=10){
situacao="Aprovado";
}

let tabela=document.getElementById("lista");

tabela.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${classe}</td>
<td>${curso}</td>
<td>${turma}</td>
<td>${sala}</td>
<td>${periodo}</td>
<td>${media.toFixed(1)}</td>
<td>${situacao}</td>
</tr>
`;

}

</script>

</body>
</html>
